  <!-- L1: x=380 -->
  <!-- L2: x=450 -->
  <!-- L3: x=520 -->
  <!-- connections L1->L2 -->
  <line x1="388" y1="160" x2="442" y2="180" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="388" y1="200" x2="442" y2="180" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="388" y1="200" x2="442" y2="220" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="388" y1="240" x2="442" y2="220" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="388" y1="240" x2="442" y2="260" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="388" y1="280" x2="442" y2="260" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="388" y1="280" x2="442" y2="300" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="388" y1="320" x2="442" y2="300" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="388" y1="320" x2="442" y2="340" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="388" y1="360" x2="442" y2="340" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="388" y1="360" x2="442" y2="380" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="388" y1="400" x2="442" y2="380" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <!-- connections L2->L3 -->
  <line x1="458" y1="180" x2="512" y2="200" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="458" y1="220" x2="512" y2="200" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="458" y1="220" x2="512" y2="240" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="458" y1="260" x2="512" y2="240" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="458" y1="260" x2="512" y2="280" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="458" y1="300" x2="512" y2="280" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="458" y1="300" x2="512" y2="320" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="458" y1="340" x2="512" y2="320" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="458" y1="340" x2="512" y2="360" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <line x1="458" y1="380" x2="512" y2="360" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>

  <!-- L1 nodes -->
  <circle cx="388" cy="160" r="7" fill="#172a45" stroke="#64ffda" stroke-width="1.4"/>
  <circle cx="388" cy="200" r="7" fill="#172a45" stroke="#64ffda" stroke-width="1.4"/>
  <circle cx="388" cy="240" r="7" fill="#172a45" stroke="#64ffda" stroke-width="1.4"/>
  <circle cx="388" cy="280" r="7" fill="#172a45" stroke="#64ffda" stroke-width="1.4"/>
  <circle cx="388" cy="320" r="7" fill="#172a45" stroke="#64ffda" stroke-width="1.4"/>
  <circle cx="388" cy="360" r="7" fill="#172a45" stroke="#64ffda" stroke-width="1.4"/>
  <circle cx="388" cy="400" r="7" fill="#172a45" stroke="#64ffda" stroke-width="1.4"/>
  <!-- L2 nodes -->
