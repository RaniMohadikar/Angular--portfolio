<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560">
  <defs>
    <linearGradient id="gbg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a192f"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="gg4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="#4dd9bf"/>
    </linearGradient>
  </defs>
  <rect width="900" height="560" fill="url(#gbg4)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="rgba(100,255,218,0.4)" letter-spacing="3">LLM CONTEXTUAL RESPONSE ENGINE</text>
  <line x1="80" y1="50" x2="820" y2="50" stroke="rgba(100,255,218,0.07)" stroke-width="1"/>

  <!-- Left: Prompt Builder -->
  <rect x="30" y="70" width="260" height="440" rx="14" fill="#112240" stroke="rgba(100,255,218,0.12)" stroke-width="1.5"/>
  <rect x="30" y="70" width="260" height="3" rx="1.5" fill="url(#gg4)"/>
  <text x="160" y="96" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="rgba(100,255,218,0.45)" letter-spacing="2">PROMPT BUILDER</text>

  <!-- system prompt -->
  <rect x="46" y="108" width="228" height="68" rx="8" fill="#172a45" stroke="rgba(100,255,218,0.07)" stroke-width="1"/>
  <text x="60" y="126" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="rgba(100,255,218,0.4)">// System Prompt</text>
  <text x="60" y="142" font-family="Segoe UI,Arial,sans-serif" font-size="10.5" fill="#8892b0">"You are a helpful AI</text>
  <text x="60" y="158" font-family="Segoe UI,Arial,sans-serif" font-size="10.5" fill="#8892b0"> assistant for Bluexkye..."</text>

  <!-- context block -->
  <rect x="46" y="186" width="228" height="68" rx="8" fill="#172a45" stroke="rgba(100,255,218,0.07)" stroke-width="1"/>
  <text x="60" y="204" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="rgba(100,255,218,0.4)">// Conversation Context</text>
  <text x="60" y="220" font-family="Segoe UI,Arial,sans-serif" font-size="10.5" fill="#8892b0">history: [last 10 turns]</text>
  <text x="60" y="236" font-family="Segoe UI,Arial,sans-serif" font-size="10.5" fill="#8892b0">user_profile: {prefs...}</text>

  <!-- user query -->
  <rect x="46" y="264" width="228" height="56" rx="8" fill="#172a45" stroke="rgba(100,255,218,0.07)" stroke-width="1"/>
  <text x="60" y="282" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="rgba(100,255,218,0.4)">// User Message</text>
  <text x="60" y="298" font-family="Segoe UI,Arial,sans-serif" font-size="10.5" fill="#ccd6f6">"What is the refund</text>
  <text x="60" y="314" font-family="Segoe UI,Arial,sans-serif" font-size="10.5" fill="#ccd6f6"> policy for premium?"</text>

  <!-- token meter -->
  <text x="46" y="344" font-family="Segoe UI,Arial,sans-serif" font-size="10.5" fill="#8892b0">Tokens: <tspan fill="#64ffda">342</tspan> / 4096</text>
  <rect x="46" y="350" width="228" height="7" rx="3.5" fill="#172a45"/>
  <rect x="46" y="350" width="76" height="7" rx="3.5" fill="url(#gg4)" opacity="0.7"/>

  <!-- params -->
  <text x="46" y="378" font-family="Segoe UI,Arial,sans-serif" font-size="10.5" fill="#8892b0">temperature:  <tspan fill="#64ffda">0.7</tspan></text>
  <text x="46" y="396" font-family="Segoe UI,Arial,sans-serif" font-size="10.5" fill="#8892b0">max_tokens:  <tspan fill="#64ffda">512</tspan></text>
  <text x="46" y="414" font-family="Segoe UI,Arial,sans-serif" font-size="10.5" fill="#8892b0">model:  <tspan fill="#64ffda">llm-v2-turbo</tspan></text>

  <!-- send btn -->
  <rect x="46" y="432" width="228" height="40" rx="20" fill="url(#gg4)"/>
  <text x="160" y="457" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#0a192f" font-weight="700">▶  Send to LLM</text>

  <!-- Arrow -->
  <line x1="292" y1="280" x2="330" y2="280" stroke="rgba(100,255,218,0.5)" stroke-width="2"/>
  <polygon points="326,274 336,280 326,286" fill="#64ffda"/>

  <!-- Center: neural net -->
  <rect x="340" y="70" width="220" height="440" rx="14" fill="#112240" stroke="rgba(100,255,218,0.15)" stroke-width="2"/>
  <rect x="340" y="70" width="220" height="4" rx="2" fill="url(#gg4)"/>
  <text x="450" y="96" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="rgba(100,255,218,0.45)" letter-spacing="2">LLM CORE</text>

