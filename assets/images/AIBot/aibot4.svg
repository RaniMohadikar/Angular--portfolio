  <circle cx="450" cy="260" r="9" fill="#172a45" stroke="#4dd9bf" stroke-width="1.4"/>
  <circle cx="450" cy="300" r="9" fill="#172a45" stroke="#4dd9bf" stroke-width="1.4"/>
  <circle cx="450" cy="340" r="9" fill="#172a45" stroke="#4dd9bf" stroke-width="1.4"/>
  <circle cx="450" cy="380" r="9" fill="#172a45" stroke="#4dd9bf" stroke-width="1.4"/>
