  <circle cx="512" cy="240" r="7" fill="#172a45" stroke="#64ffda" stroke-width="1.4"/>
  <circle cx="512" cy="280" r="7" fill="#172a45" stroke="#64ffda" stroke-width="1.4"/>
  <circle cx="512" cy="320" r="7" fill="#172a45" stroke="#64ffda" stroke-width="1.4"/>
  <circle cx="512" cy="360" r="7" fill="#172a45" stroke="#64ffda" stroke-width="1.4"/>

  <text x="450" y="432" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="rgba(100,255,218,0.3)">Transformer · Attention</text>
  <text x="450" y="450" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="rgba(100,255,218,0.2)">Embeddings · Decoding</text>

  <!-- Arrow out -->
  <line x1="562" y1="280" x2="600" y2="280" stroke="rgba(100,255,218,0.5)" stroke-width="2"/>
  <polygon points="596,274 606,280 596,286" fill="#64ffda"/>

