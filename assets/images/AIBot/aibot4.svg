  <rect x="610" y="70" width="260" height="3" rx="1.5" fill="url(#gg4)"/>
  <text x="740" y="96" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="rgba(100,255,218,0.45)" letter-spacing="2">AI RESPONSE</text>

  <!-- output lines simulation -->
  <rect x="626" y="108" width="228" height="238" rx="8" fill="#172a45" stroke="rgba(100,255,218,0.06)" stroke-width="1"/>
  <rect x="638" y="120" width="192" height="10" rx="5" fill="rgba(100,255,218,0.18)"/>
  <rect x="638" y="136" width="210" height="10" rx="5" fill="rgba(100,255,218,0.14)"/>
  <rect x="638" y="152" width="178" height="10" rx="5" fill="rgba(100,255,218,0.12)"/>
  <rect x="638" y="168" width="216" height="10" rx="5" fill="rgba(100,255,218,0.1)"/>
  <rect x="638" y="184" width="164" height="10" rx="5" fill="rgba(100,255,218,0.08)"/>
  <rect x="638" y="208" width="200" height="10" rx="5" fill="rgba(100,255,218,0.07)"/>
  <rect x="638" y="224" width="188" height="10" rx="5" fill="rgba(100,255,218,0.06)"/>
  <rect x="638" y="240" width="218" height="10" rx="5" fill="rgba(100,255,218,0.05)"/>
  <rect x="638" y="256" width="170" height="10" rx="5" fill="rgba(100,255,218,0.04)"/>
  <!-- text overlay -->
  <text x="638" y="130" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#ccd6f6">Our refund policy allows a</text>
  <text x="638" y="148" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#ccd6f6">full refund within 30 days.</text>
  <text x="638" y="168" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#a8b2d1">After 30 days, partial refunds</text>
  <text x="638" y="186" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#a8b2d1">may apply based on usage...</text>
  <!-- cursor -->
  <rect x="638" y="316" width="7" height="14" rx="2" fill="#64ffda" opacity="0.8"/>

  <!-- confidence -->
  <rect x="626" y="358" width="228" height="52" rx="8" fill="rgba(100,255,218,0.04)" stroke="rgba(100,255,218,0.07)" stroke-width="1"/>
  <text x="638" y="376" font-family="Segoe UI,Arial,sans-serif" font-size="10.5" fill="#8892b0">Confidence Score</text>
  <rect x="638" y="382" width="204" height="8" rx="4" fill="#172a45"/>
  <rect x="638" y="382" width="172" height="8" rx="4" fill="url(#gg4)" opacity="0.6"/>
  <text x="836" y="390" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="10.5" fill="#64ffda">94.2%</text>

  <!-- metadata -->
  <text x="626" y="430" font-family="Segoe UI,Arial,sans-serif" font-size="10.5" fill="#8892b0">Tokens: <tspan fill="#64ffda">187</tspan>  ·  Latency: <tspan fill="#64ffda">320ms</tspan></text>
  <text x="626" y="448" font-family="Segoe UI,Arial,sans-serif" font-size="10.5" fill="#8892b0">Model: <tspan fill="#64ffda">llm-v2-chat-turbo</tspan></text>

  <!-- delivered -->
  <rect x="626" y="462" width="228" height="36" rx="18" fill="rgba(100,255,218,0.08)" stroke="rgba(100,255,218,0.2)" stroke-width="1"/>
  <text x="740" y="485" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#64ffda">✓ Delivered to Client</text>

  <text x="450" y="536" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="rgba(100,255,218,0.15)" letter-spacing="3">CONTEXTUAL AI · STREAMING · SUB-500ms LATENCY</text>
