<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560">
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a192f"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="gg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="#4dd9bf"/>
    </linearGradient>
  </defs>

  <!-- bg -->
  <rect width="900" height="560" fill="url(#gbg)"/>

  <!-- left: chat window -->
  <rect x="30" y="30" width="380" height="500" rx="16" fill="#112240" stroke="rgba(100,255,218,0.15)" stroke-width="1.5"/>
  <!-- header bar -->
  <rect x="30" y="30" width="380" height="64" rx="16" fill="#0d2137"/>
  <rect x="30" y="78" width="380" height="16" fill="#0d2137"/>
  <!-- green top line -->
  <rect x="30" y="30" width="380" height="3" rx="2" fill="url(#gg)"/>

  <!-- avatar circle -->
  <circle cx="70" cy="62" r="18" fill="rgba(100,255,218,0.1)" stroke="rgba(100,255,218,0.3)" stroke-width="1.5"/>
  <!-- robot head -->
  <rect x="61" y="53" width="18" height="15" rx="4" fill="none" stroke="#64ffda" stroke-width="1.4"/>
  <rect x="64" y="57" width="4" height="4" rx="1" fill="#64ffda"/>
  <rect x="71" y="57" width="4" height="4" rx="1" fill="#64ffda"/>
  <rect x="64" y="63" width="11" height="2.5" rx="1.2" fill="#64ffda"/>
  <line x1="70" y1="53" x2="70" y2="48" stroke="#64ffda" stroke-width="1.4"/>
  <circle cx="70" cy="46" r="2" fill="#64ffda"/>
  <!-- online dot -->
  <circle cx="84" cy="72" r="4" fill="#64ffda"/>

  <text x="96" y="58" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#e6f1ff" font-weight="700">AI Assistant</text>
  <text x="96" y="74" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#64ffda">● Online · LLM Powered</text>

  <!-- bot msg 1 -->
  <rect x="48" y="112" width="240" height="52" rx="12" fill="#172a45"/>
  <text x="64" y="132" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#a8b2d1">Hi! I'm your AI assistant.</text>
  <text x="64" y="150" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#a8b2d1">How can I help you today?</text>

  <!-- user msg 1 -->
  <rect x="190" y="180" width="200" height="36" rx="12" fill="rgba(100,255,218,0.1)" stroke="rgba(100,255,218,0.15)" stroke-width="1"/>
  <text x="206" y="203" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#ccd6f6">Book a meeting for 10 AM</text>

  <!-- bot msg 2 -->
  <rect x="48" y="232" width="270" height="66" rx="12" fill="#172a45"/>
  <text x="64" y="252" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#a8b2d1">Sure! Meeting scheduled:</text>
  <rect x="64" y="260" width="238" height="28" rx="6" fill="rgba(100,255,218,0.06)" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <text x="76" y="276" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#64ffda">📅 Tomorrow 10:00 AM · Invite sent ✓</text>

  <!-- user msg 2 -->
  <rect x="220" y="314" width="168" height="36" rx="12" fill="rgba(100,255,218,0.1)" stroke="rgba(100,255,218,0.15)" stroke-width="1"/>
  <text x="236" y="337" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#ccd6f6">Weather in Pune?</text>

  <!-- bot msg 3 -->
  <rect x="48" y="366" width="270" height="66" rx="12" fill="#172a45"/>
  <text x="64" y="386" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#a8b2d1">Pune — Live Weather</text>
  <text x="64" y="408" font-family="Segoe UI,Arial,sans-serif" font-size="26" fill="#64ffda" font-weight="700">28°C ☀</text>
  <text x="148" y="408" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8892b0"> Clear · Wind NE · Humidity 62%</text>

  <!-- typing indicator -->
  <rect x="48" y="448" width="60" height="28" rx="14" fill="#172a45"/>
  <circle cx="66" cy="462" r="4" fill="#64ffda" opacity="0.7"/>
  <circle cx="78" cy="462" r="4" fill="#64ffda" opacity="0.5"/>
  <circle cx="90" cy="462" r="4" fill="#64ffda" opacity="0.3"/>

  <!-- input bar -->
  <rect x="46" y="490" width="338" height="36" rx="18" fill="#0d2137" stroke="rgba(100,255,218,0.2)" stroke-width="1.5"/>
  <text x="66" y="513" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="rgba(136,146,176,0.5)">Ask me anything...</text>
  <circle cx="366" cy="508" r="14" fill="url(#gg)"/>
  <polygon points="359,508 369,503 369,513" fill="#0a192f"/>

  <!-- right: info panel -->
  <rect x="438" y="30" width="432" height="500" rx="16" fill="#112240" stroke="rgba(100,255,218,0.08)" stroke-width="1"/>
  <rect x="438" y="30" width="432" height="3" rx="2" fill="url(#gg)" opacity="0.5"/>

  <text x="460" y="62" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="rgba(100,255,218,0.5)" letter-spacing="2">SYSTEM ARCHITECTURE</text>

  <!-- OndeWo block -->
  <rect x="456" y="76" width="396" height="100" rx="10" fill="#172a45" stroke="rgba(100,255,218,0.12)" stroke-width="1"/>
  <rect x="456" y="76" width="396" height="3" rx="1.5" fill="#64ffda"/>
  <text x="474" y="98" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#64ffda" font-weight="700">01. OndeWo NLU</text>
  <text x="474" y="116" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8892b0">Intent Detection · Dialog Flow · Entity Extraction</text>
  <rect x="474" y="124" width="80" height="18" rx="9" fill="rgba(100,255,218,0.1)"/>
  <text x="514" y="136" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#64ffda">Rule-Based</text>
  <rect x="562" y="124" width="100" height="18" rx="9" fill="rgba(100,255,218,0.1)"/>
  <text x="612" y="136" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#64ffda">Structured Flow</text>
  <text x="474" y="160" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8892b0">Handles structured intents and routes to dialog handlers</text>

  <!-- arrow -->
  <line x1="654" y1="178" x2="654" y2="192" stroke="rgba(100,255,218,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="649,190 654,198 659,190" fill="rgba(100,255,218,0.4)"/>

  <!-- MCP block -->
  <rect x="456" y="202" width="396" height="100" rx="10" fill="#172a45" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <rect x="456" y="202" width="396" height="3" rx="1.5" fill="#4dd9bf"/>
  <text x="474" y="224" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#4dd9bf" font-weight="700">02. MCP Server</text>
  <text x="474" y="242" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8892b0">Middleware · Business Logic · API Routing</text>
  <rect x="474" y="250" width="70" height="18" rx="9" fill="rgba(77,217,191,0.1)"/>
  <text x="509" y="262" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#4dd9bf">Node.js</text>
  <rect x="552" y="250" width="90" height="18" rx="9" fill="rgba(77,217,191,0.1)"/>
  <text x="597" y="262" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#4dd9bf">REST APIs</text>
  <text x="474" y="286" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8892b0">Orchestrates integrations and routes context to LLM</text>

  <!-- arrow -->
  <line x1="654" y1="304" x2="654" y2="318" stroke="rgba(100,255,218,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="649,316 654,324 659,316" fill="rgba(100,255,218,0.4)"/>

  <!-- LLM block -->
  <rect x="456" y="328" width="396" height="100" rx="10" fill="#172a45" stroke="rgba(100,255,218,0.1)" stroke-width="1"/>
  <rect x="456" y="328" width="396" height="3" rx="1.5" fill="#a8b2d1"/>
  <text x="474" y="350" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#ccd6f6" font-weight="700">03. LLM Engine</text>
  <text x="474" y="368" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8892b0">Contextual AI · Open-ended Responses · Streaming</text>
  <rect x="474" y="376" width="120" height="18" rx="9" fill="rgba(168,178,209,0.1)"/>
  <text x="534" y="388" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#a8b2d1">Transformer Model</text>
  <text x="474" y="412" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8892b0">Generates intelligent context-aware responses</text>

  <!-- tech tags row -->
  <rect x="456" y="454" width="396" height="58" rx="10" fill="rgba(100,255,218,0.03)" stroke="rgba(100,255,218,0.07)" stroke-width="1"/>
  <text x="476" y="476" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="rgba(100,255,218,0.5)">TECH STACK:</text>
  <text x="476" y="496" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8892b0">OndeWo  ·  MCP Server  ·  LLM  ·  Node.js  ·  REST APIs</text>

  <!-- label -->
  <text x="870" y="548" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="rgba(100,255,218,0.2)">AI CHATBOT SYSTEM · BLUEXKYE</text>
</svg>
