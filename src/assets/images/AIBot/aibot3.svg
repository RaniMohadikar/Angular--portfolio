<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560">
  <defs>
    <linearGradient id="gbg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a192f"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="gg3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="#4dd9bf"/>
    </linearGradient>
  </defs>
  <rect width="900" height="560" fill="url(#gbg3)"/>

  <!-- title -->
  <text x="450" y="40" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="rgba(100,255,218,0.4)" letter-spacing="3">MCP SERVER — MIDDLEWARE HUB ARCHITECTURE</text>
  <line x1="80" y1="50" x2="820" y2="50" stroke="rgba(100,255,218,0.07)" stroke-width="1"/>

  <!-- Center MCP hub -->
  <circle cx="450" cy="280" r="78" fill="rgba(100,255,218,0.03)" stroke="rgba(100,255,218,0.15)" stroke-width="1.5"/>
  <circle cx="450" cy="280" r="56" fill="#112240" stroke="rgba(100,255,218,0.2)" stroke-width="2"/>
  <!-- server icon -->
  <rect x="434" y="262" width="32" height="8" rx="3" fill="none" stroke="#64ffda" stroke-width="1.5"/>
  <circle cx="442" cy="266" r="2" fill="#64ffda"/>
  <rect x="434" y="274" width="32" height="8" rx="3" fill="none" stroke="#64ffda" stroke-width="1.5"/>
  <circle cx="442" cy="278" r="2" fill="#64ffda"/>
  <rect x="434" y="286" width="32" height="8" rx="3" fill="none" stroke="#64ffda" stroke-width="1.5"/>
  <circle cx="442" cy="290" r="2" fill="#64ffda"/>
  <text x="450" y="312" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#64ffda" font-weight="700">MCP</text>

  <!-- orbit ring -->
  <circle cx="450" cy="280" r="100" fill="none" stroke="rgba(100,255,218,0.04)" stroke-width="1" stroke-dasharray="6,5"/>

  <!-- Helper function: 6 nodes around hub at angles: top(270), TR(330), BR(30), Bot(90), BL(150), TL(210) -->
  <!-- r=168 from center -->

  <!-- top: OndeWo (450-168*sin0, 280-168*cos0) = (450,112) -->
  <line x1="450" y1="224" x2="450" y2="152" stroke="rgba(100,255,218,0.2)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="445,155 450,145 455,155" fill="rgba(100,255,218,0.35)"/>
  <rect x="374" y="68" width="152" height="72" rx="12" fill="#112240" stroke="rgba(100,255,218,0.2)" stroke-width="1.5"/>
  <rect x="374" y="68" width="152" height="3" rx="1.5" fill="#64ffda"/>
  <text x="450" y="92" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#64ffda" font-weight="700">OndeWo NLU</text>
  <text x="450" y="108" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8892b0">Intent · Entities</text>
  <text x="450" y="124" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8892b0">Dialog Flow</text>

  <!-- top-right: LLM Engine (450+168*sin60, 280-168*cos60) = (595,196) -->
  <line x1="496" y1="237" x2="584" y2="200" stroke="rgba(168,178,209,0.2)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="580,206 591,196 582,208" fill="rgba(168,178,209,0.35)"/>
  <rect x="596" y="120" width="152" height="72" rx="12" fill="#112240" stroke="rgba(168,178,209,0.18)" stroke-width="1.5"/>
  <rect x="596" y="120" width="152" height="3" rx="1.5" fill="#a8b2d1"/>
  <text x="672" y="144" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#ccd6f6" font-weight="700">LLM Engine</text>
  <text x="672" y="160" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8892b0">Contextual AI</text>
  <text x="672" y="176" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8892b0">Responses</text>

  <!-- right: Database (450+168, 280) = (618,280) -->
  <line x1="508" y1="280" x2="568" y2="280" stroke="rgba(100,255,218,0.2)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="564,274 574,280 564,286" fill="rgba(100,255,218,0.35)"/>
  <rect x="576" y="244" width="152" height="72" rx="12" fill="#112240" stroke="rgba(100,255,218,0.15)" stroke-width="1.5"/>
  <rect x="576" y="244" width="152" height="3" rx="1.5" fill="#64ffda" opacity="0.5"/>
  <text x="652" y="268" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#64ffda" font-weight="700">Database</text>
  <text x="652" y="284" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8892b0">Session · Context</text>
  <text x="652" y="300" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8892b0">MongoDB · Redis</text>

  <!-- bottom-right: 3rd-party APIs (450+168*sin60, 280+168*cos60) = (595,364) -->
  <line x1="496" y1="323" x2="582" y2="358" stroke="rgba(100,255,218,0.2)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="578,352 590,364 579,363" fill="rgba(100,255,218,0.35)"/>
  <rect x="596" y="368" width="152" height="72" rx="12" fill="#112240" stroke="rgba(100,255,218,0.15)" stroke-width="1.5"/>
  <rect x="596" y="368" width="152" height="3" rx="1.5" fill="#64ffda" opacity="0.5"/>
  <text x="672" y="392" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#64ffda" font-weight="700">3rd-Party APIs</text>
  <text x="672" y="408" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8892b0">Calendar · CRM</text>
  <text x="672" y="424" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8892b0">Notifications</text>

  <!-- bottom: Auth (450, 280+168) = (450,448) -->
  <line x1="450" y1="336" x2="450" y2="400" stroke="rgba(100,255,218,0.2)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="445,397 450,407 455,397" fill="rgba(100,255,218,0.35)"/>
  <rect x="374" y="408" width="152" height="72" rx="12" fill="#112240" stroke="rgba(100,255,218,0.15)" stroke-width="1.5"/>
  <rect x="374" y="408" width="152" height="3" rx="1.5" fill="#64ffda" opacity="0.5"/>
  <text x="450" y="432" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#64ffda" font-weight="700">Auth Layer</text>
  <text x="450" y="448" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8892b0">JWT · OAuth2</text>
  <text x="450" y="464" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8892b0">Session Mgmt</text>

  <!-- left: Client App (450-168, 280) = (282,280) -->
  <line x1="392" y1="280" x2="332" y2="280" stroke="rgba(100,255,218,0.2)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="336,274 326,280 336,286" fill="rgba(100,255,218,0.35)"/>
  <rect x="172" y="244" width="152" height="72" rx="12" fill="#112240" stroke="rgba(100,255,218,0.2)" stroke-width="1.5"/>
  <rect x="172" y="244" width="152" height="3" rx="1.5" fill="#64ffda"/>
  <text x="248" y="268" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#64ffda" font-weight="700">Client App</text>
  <text x="248" y="284" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8892b0">Angular · React</text>
  <text x="248" y="300" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#8892b0">WebSocket · HTTP</text>

  <!-- footer label -->
  <text x="450" y="520" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="rgba(100,255,218,0.15)" letter-spacing="3">MCP SERVER ORCHESTRATION ARCHITECTURE</text>
</svg>
