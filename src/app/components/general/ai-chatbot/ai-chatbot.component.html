<div class="chatbot-wrapper">

  <!-- Chat Window -->
  <div class="chat-window" [class.open]="isOpen">
    <!-- Header -->
    <div class="chat-header">
      <div class="bot-avatar">
        <span class="avatar-icon">🤖</span>
        <span class="status-dot"></span>
      </div>
      <div class="bot-info">
        <span class="bot-name">Rani's AI Assistant</span>
        <span class="bot-status">Online · Powered by AI</span>
      </div>
      <button class="close-btn" (click)="toggleChat()" aria-label="Close chat">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Messages -->
    <div class="messages-container" #messagesContainer>

      <!-- Welcome state -->
      <div class="welcome-banner" *ngIf="messages.length === 0">
        <div class="welcome-icon">✨</div>
        <p>Ask me anything about Rani's work, skills, or generate AI images!</p>
      </div>

      <!-- Message list -->
      <div *ngFor="let msg of messages" class="message-wrapper" [class.user-wrapper]="msg.sender === 'user'">
        <div class="avatar-mini" *ngIf="msg.sender === 'bot'">🤖</div>
        <div class="bubble" [class.user-bubble]="msg.sender === 'user'" [class.bot-bubble]="msg.sender === 'bot'">
          <span [innerHTML]="formatText(msg.text)"></span>

          <!-- Image loading state -->
          <div class="image-loading" *ngIf="msg.isImageLoading">
            <div class="image-skeleton">
              <div class="shimmer"></div>
              <div class="loading-label">
                <span class="dot-pulse">Generating</span>
              </div>
            </div>
          </div>

          <!-- Generated image -->
          <div class="generated-image-container" *ngIf="msg.imageUrl && !msg.isImageLoading">
            <img [src]="msg.imageUrl" alt="AI Generated Image" class="generated-image" loading="lazy" />
            <div class="image-footer">
              <span>🎨 AI Generated</span>
              <a [href]="msg.imageUrl" target="_blank" rel="noopener" class="view-full">View Full</a>
            </div>
          </div>
        </div>
      </div>

      <!-- Typing indicator -->
      <div class="message-wrapper" *ngIf="isThinking">
        <div class="avatar-mini">🤖</div>
        <div class="bubble bot-bubble typing-bubble">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </div>
      </div>

    </div>

    <!-- Quick chips -->
    <div class="quick-chips" *ngIf="chips.length > 0">
      <button class="chip" *ngFor="let chip of chips" (click)="sendMessage(chip.value)">
        {{ chip.label }}
      </button>
    </div>

    <!-- Input -->
    <div class="input-area">
      <textarea
        [(ngModel)]="userInput"
        (keydown)="onKeydown($event)"
        placeholder="Ask me anything or say 'generate image of...'"
        rows="1"
        class="chat-input"
      ></textarea>
      <button class="send-btn" (click)="sendMessage()" [disabled]="!userInput.trim()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Toggle Button -->
  <button class="chat-toggle" (click)="toggleChat()" [class.is-open]="isOpen" aria-label="Toggle AI Chat">
    <span class="toggle-icon open-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </span>
    <span class="toggle-icon closed-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l4.93-1.37C8.42 21.5 10.15 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm-1 13H7v-2h4v2zm0-4H7V9h4v2zm5 4h-3v-2h3v2zm0-4h-3V9h3v2z"/>
      </svg>
    </span>
    <span class="pulse-ring"></span>
  </button>

</div>
